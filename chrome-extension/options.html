<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Parser Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="panel options">
    <section class="hero">
      <p class="eyebrow">Settings</p>
      <h1>Task Parser Assistant</h1>
      <p class="subtitle">Choose which backend the extension should use.</p>
    </section>

    <label class="field">
      <span>Backend URL</span>
      <input id="apiUrl" type="url" placeholder="http://127.0.0.1:8000">
    </label>

    <div class="actions">
      <button id="saveButton" type="button">Save Settings</button>
    </div>

    <p id="statusMessage" class="status" aria-live="polite"></p>
  </main>

  <script src="options.js"></script>
</body>
</html>
