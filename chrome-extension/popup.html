<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Parser Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="panel">
    <section class="hero">
      <h1>Task Parser Assistant</h1>
      <p class="subtitle">Turn natural-language tasks into reminders from your browser.</p>
    </section>

    <label class="field">
      <span>Task</span>
      <textarea id="taskInput" rows="5" placeholder="Remind me to call Sam later today"></textarea>
    </label>

    <div class="actions">
      <button id="parseButton" type="button">Parse Task</button>
    </div>

    <div class="actions actions-reminder">
      <button id="scheduleButton" type="button" disabled>Schedule Reminder</button>
    </div>

    <p id="statusMessage" class="status" aria-live="polite"></p>

    <section>
      <div class="result-header">
        <h2>Result</h2>
        <span id="confidenceBadge" class="badge badge-muted">No parse yet</span>
      </div>
      <div id="reminderSummary" class="reminder-summary">No reminder scheduled.</div>
      <div id="summaryCards" class="cards"></div>
      <div id="feedbackSection" class="feedback"></div>
      <pre id="resultOutput" class="result">No result yet.</pre>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
